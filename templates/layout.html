<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusQuest Habit Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

 
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body class = "main">

  <h1 class="title">Focus Quest</h1>

  <nav class="navbar">
    <a href = "{{url_for('index')}}"><div class="logo">FocusQuest</div>
      </a>

    {% if session["user_id"] %}
      <ul class="nav-links">
        <li><a href="{{ url_for('add_habit') }}">Add Habit</a></li>
        <li><a href="{{ url_for('habits') }}">Habits</a></li>
        <li><a href="{{url_for('stats') }}">Stats</a></li>
        <li><a href="{{url_for('logout') }}">Log out</a></li>
      </ul>
    {% else %}
    <ul class="nav-links">
      <li><a href="{{ url_for('register') }}">Register</a></li>
       <li><a href="{{url_for('login' )}}">log in</a></li>
    </ul>
    {% endif %}
    </nav>
  <hr class="nav-separator">

  {% block content %}
  {% endblock %}

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
